<!DOCTYPE html>
<html>
<head>
    <title>BookTAL</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            z-index: 2;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
        }

        .nav-buttons a {
            margin-left: 20px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-buttons a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
                url("https://images.unsplash.com/photo-1504198266285-165a1c66c7c2");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 64px;
            margin: 0;
        }

        .hero p {
            font-size: 18px;
            margin-top: 10px;
            opacity: 0.8;
        }

        .main-btn {
            margin-top: 25px;
            background: #7b2cbf;
            padding: 14px 35px;
            border-radius: 25px;
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: 0.2s;
        }

        .main-btn:hover {
            background: #9d4edd;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Tri Airlines</div>

    <div class="nav-buttons">
        <a href="#">My Account</a>
        <a href="#">Book Flight</a>
        <a href="#">Discord</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Your trip starts here</h1>
    <p>Experience Tri Airlines</p>

    <a class="main-btn" href="https://www.roblox.com/games/YOURGAMEID">
        Book Flight
    </a>
</div>

</body>
</html>
