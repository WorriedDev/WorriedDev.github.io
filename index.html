<!DOCTYPE html>
<html>
<head>
    <title>BookTAL</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(43,10,61,0.9)),
                        url("https://images.unsplash.com/photo-1504198266285-165a1c66c7c2");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 70px;
            margin: 0;
        }

        p {
            font-size: 20px;
            opacity: 0.8;
            margin-top: 10px;
        }

        .btn {
            margin-top: 30px;
            background: #7b2cbf;
            padding: 15px 40px;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #9d4edd;
            transform: scale(1.05);
        }

        .section {
            padding: 80px 20px;
            text-align: center;
        }

        .fleet {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .card {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            width: 200px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: #1a1a1a;
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>Your trip starts here</h1>
    <p>Experience Tri Airlines</p>

    <a class="btn" href="https://discord.gg/FxbTBPnWFR>
        Book Flight
    </a>
</div>

<div class="section">
    <h2>Our Fleet</h2>

    <div class="fleet">
        <div class="card">Boeing 787-10</div>
        <div class="card">Boeing 737-800</div>
        <div class="card">Dash-8 Q400</div>
    </div>
</div>

</body>
</html>
