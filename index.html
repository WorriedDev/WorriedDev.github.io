<!DOCTYPE html>
<html>
<head>
    <title>BookTAL</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(black, #2b0a3d);
            color: white;
        }

        .navbar {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            margin-top: 100px;
        }

        .hero h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.7;
        }

        .btn {
            margin-top: 30px;
            display: inline-block;
            background: #7b2cbf;
            padding: 15px 40px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        .btn:hover {
            background: #9d4edd;
        }

        .section {
            margin-top: 120px;
            text-align: center;
        }

        .fleet {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            width: 150px;
        }
    </style>
</head>

<body>

<div class="navbar">
    BookTAL
</div>

<div class="hero">
    <h1>Your trip starts here</h1>
    <p>Experience Tri Airlines</p>

    <a class="btn" href="https://www.roblox.com/games/140213248013068">
        Book Flight
    </a>
</div>

<div class="section">
    <h2>Our Fleet</h2>

    <div class="fleet">
        <div class="card">787-10</div>
        <div class="card">737-800</div>
        <div class="card">Q400</div>
    </div>
</div>

</body>
</html>
